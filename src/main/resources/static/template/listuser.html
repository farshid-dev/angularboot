<div class="container pb-modalreglog-container">
    <div class="row">
        <div class="col-xs-12 col-md-4 col-md-offset-4">
            <div class="modal fade" id="createUserModal" tabindex="-1" role="dialog" aria-labelledby="createUserModalLabel"
                 aria-hidden="true">
                <div class="modal-dialog modal-sm" role="document">
                    <div class="modal-content">
                        <div class="modal-header">
                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                            <h4 class="modal-title" id="myModalLabel1">Registration form</h4>
                        </div>
                        <div class="modal-body">
                            <form ng-submit="registerUserForm()" class="pb-modalreglog-form-reg">
                                <div class="form-group">
                                    <div id="pb-modalreglog-progressbar1"></div>
                                </div>
                                <div class="form-group">
                                    <label>Username</label>
                                    <div class="input-group pb-modalreglog-input-group">
                                        <span class="input-group-addon"><span
                                                class="glyphicon glyphicon-user"></span></span>
                                        <input type="text" ng-model="user.username" class="form-control"
                                               id="uname1" placeholder="Enter User name">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Password</label>
                                    <div class="input-group pb-modalreglog-input-group">
                                        <span class="input-group-addon"><span
                                                class="glyphicon glyphicon-lock"></span></span>
                                        <input type="text" ng-model="user.password" id="pass1" class="form-control"
                                               placeholder="Enter Password">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Address</label>
                                    <div class="input-group pb-modalreglog-input-group">
                                        <span class="input-group-addon"><span class="glyphicon glyphicon-globe"></span></span>
                                        <input type="text" ng-model="user.address" id="address1" class="form-control"
                                               placeholder="Address">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="email">Email</label>
                                    <div class="input-group pb-modalreglog-input-group">
                                        <span class="input-group-addon"><span
                                                class="glyphicon glyphicon-user"></span></span>
                                        <input type="email" ng-model="user.email" id="email1" class="form-control"
                                               placeholder="Email">
                                    </div>
                                </div>
                                    <div class="row">
                                        <div class="form-group">
                                            <label>Role</label>
                                            <div class="input-group pb-modalreglog-input-group">
                                            <span class="input-group-addon"><span
                                                    class="glyphicon glyphicon-user"></span></span>
                                                <select ng-model="user.userRoleId" class="form-control" ng-options="role.id as role.name for role in roless">
                                                    <option value="">-- Select Role --</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                                    <input type="submit" value="Register User"
                                           class="btn btn-primary btn-sm">
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-xs-12 col-md-4 col-md-offset-4">
            <div class="modal fade" id="myModal2" tabindex="-1" role="dialog" aria-labelledby="myModalLabel"
                 aria-hidden="true">
                <div class="modal-dialog modal-sm" role="document">
                    <div class="modal-content">
                        <div class="modal-header">
                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                            <h4 class="modal-title" id="myModalLabel">Registration form</h4>
                        </div>
                        <div class="modal-body">
                            <form ng-submit="submitUserForm(user.id)" class="pb-modalreglog-form-reg">
                                <div class="form-group">
                                    <div id="pb-modalreglog-progressbar"></div>
                                </div>
                                <div class="form-group">
                                    <label>Username</label>
                                    <div class="input-group pb-modalreglog-input-group">
                                        <span class="input-group-addon"><span
                                                class="glyphicon glyphicon-user"></span></span>
                                        <input type="text" ng-model="user.username" class="form-control"
                                               id="uname" placeholder="Enter User name">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Password</label>
                                    <div class="input-group pb-modalreglog-input-group">
                                        <span class="input-group-addon"><span
                                                class="glyphicon glyphicon-lock"></span></span>
                                        <input type="text" ng-model="user.password" id="pass" class="form-control"
                                               placeholder="Enter Password">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Address</label>
                                    <div class="input-group pb-modalreglog-input-group">
                                        <span class="input-group-addon"><span class="glyphicon glyphicon-globe"></span></span>
                                        <input type="text" ng-model="user.address" id="address" class="form-control"
                                               placeholder="Address">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="email">Email</label>
                                    <div class="input-group pb-modalreglog-input-group">
                                        <span class="input-group-addon"><span
                                                class="glyphicon glyphicon-user"></span></span>
                                        <input type="email" ng-model="user.email" id="email" class="form-control"
                                               placeholder="Email">
                                    </div>
                                </div>
                                    <div class="row">
                                        <div class="form-group">
                                            <label>Role</label>
                                            <div class="input-group pb-modalreglog-input-group">
                                                <span class="input-group-addon"><span
                                                        class="glyphicon glyphicon-user"></span></span>
                                                <select ng-model="user.userRoleId" class="form-control">
                                                    <option ng-repeat="role in roless" ng-selected="user.userRoleId == role.id" value="{{role.id}}">
                                                        {{role.name}}
                                                    </option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                                    <input type="submit" value="Register User"
                                           class="btn btn-primary btn-sm">
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="text-right">
        <a class="btn btn-default btn-rounded mb-4"
           data-toggle="modal" data-target="#createUserModal" ng-click="clearUser()">
            Create User
        </a>
    </div>
    <div class="container">
        <div class="panel panel-default ">
            <div class="alert alert-info">
                <span class="lead">List of Users </span>
            </div>
            <div class="panel-body ">
                <div class="table-responsive">
                    <table class="table table-hover table-bordered ">
                        <thead>
                        <tr>
                            <th>UserName</th>
                            <th>Email</th>
                            <th>Address</th>
                            <th>Role</th>
                            <th width="100">Edit</th>
                            <th width="100">Delete</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr ng-repeat="user in users">
                            <td>{{user.username}}</td>
                            <td>{{user.email}}</td>
                            <td>{{user.address}}</td>
                            <td>{{user.userRoleName}}</td>
                            <td>
                                <button type="button" ng-click="editUser(user.id)"
                                        class="btn btn-primary custom-width" data-toggle="modal"
                                        data-target="#myModal2">
                                    <span class="glyphicon glyphicon-edit"></span> Edit
                                </button>
                            </td>
                            <td>
                                <button type="button" ng-click="deleteUser(user.id)"
                                        class="btn btn-danger custom-width">
                                    <span class="glyphicon glyphicon-remove"></span> Delete
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
